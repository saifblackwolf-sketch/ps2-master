name: Alune-App-Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build App Folder
        run: |
          xcodebuild -project Alune.xcodeproj \
            -scheme Alune \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ENABLE_PREVIEWS=NO \
            SWIFT_OPTIMIZATION_LEVEL="-O" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Prepare Artifact
        run: |
          # X'YX(X-X+ X9Y
 YX,YX/ X'YY
 .app X6X:X7YYX,YX/ YX3X*Y
          find build -name "*.app" -exec cp -r {} ./ \;
          zip -r Alune_Folder.zip *.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Alune-Executable-App
          path: Alune_Folder.zip
