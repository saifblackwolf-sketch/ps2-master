name: Build-and-Export
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build App
        run: |
          xcodebuild -project Alune.xcodeproj \
            -scheme Alune \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Prepare Artifact
        run: |
          mkdir -p payload/Payload
          cp -r build/Release-iphoneos/Alune.app payload/Payload/
          cd payload && zip -r ../Alune.ipa .

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Alune-Emulator-Unsigned
          path: Alune.ipa

