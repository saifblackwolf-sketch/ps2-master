name: Build-iOS-No-Sign
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build IPA (No Signing)
        run: |
          xcodebuild -project Alune.xcodeproj \
            -scheme Alune \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            GCC_PREPROCESSOR_DEFINITIONS='$inherited SIGNING_DISABLED=1' \
            build

